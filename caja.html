<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Llamar cliente</title>
<style>
  :root { --bg:#0b1220; --fg:#f8fafc; --accent:#22c55e; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    background:var(--bg); color:var(--fg); user-select:none;
    font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; gap:4vh; padding:20px; text-align:center;
  }
  .cajaTitulo { font-size:1.4rem; letter-spacing:.25em; text-transform:uppercase; opacity:.6; }
  .cajaNum { font-size:2.6rem; font-weight:800; color:var(--accent); }
  button#llamar {
    width:min(80vw,420px); height:min(80vw,420px); max-height:52vh;
    border:none; border-radius:32px; cursor:pointer;
    background:linear-gradient(180deg,#22c55e,#15803d);
    color:#052e16; font-weight:900; font-size:2.4rem; line-height:1.15;
    box-shadow:0 12px 40px rgba(34,197,94,.35); transition:transform .08s;
  }
  button#llamar:active { transform:scale(.95); }
  button#llamar.enviado { background:linear-gradient(180deg,#64748b,#334155); color:#e2e8f0; }
  .estado { font-size:1.3rem; min-height:1.6em; opacity:.85; }
  .conf { position:fixed; top:16px; right:16px; font-size:.8rem; opacity:.4; }
  .conf a { color:inherit; }
</style>
</head>
<body>
  <div class="cajaTitulo">Estás en</div>
  <div class="cajaNum" id="cajaNum">Caja —</div>
  <button id="llamar">LLAMAR<br>SIGUIENTE</button>
  <div class="estado" id="estado">Toca para llamar al próximo cliente</div>
  <div class="conf" id="conf"></div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const caja = (params.get("n") || params.get("caja") || "1").trim();
  document.getElementById("cajaNum").textContent = "Caja " + caja;
  document.getElementById("conf").innerHTML =
    'Para cambiar de caja: agrega <b>?n=NUMERO</b> a la dirección';

  const btn = document.getElementById("llamar");
  const estado = document.getElementById("estado");
  let bc = null;
  try { bc = new BroadcastChannel("turnos"); } catch (e) {}

  let bloqueado = false;
  btn.addEventListener("click", async () => {
    if (bloqueado) return;
    bloqueado = true;
    btn.classList.add("enviado");
    estado.textContent = "Llamando…";

    // 1) avisa al servidor (llega a la pantalla del monitor y a las demás iPads)
    let ok = false;
    try {
      const r = await fetch("/call?caja=" + encodeURIComponent(caja), { method: "GET" });
      ok = r.ok;
    } catch (e) { ok = false; }
    // 2) respaldo local para pruebas en el mismo navegador
    if (bc) { try { bc.postMessage({ caja }); ok = true; } catch (e) {} }

    estado.textContent = ok
      ? "✓ Anunciado: Caja " + caja
      : "⚠ Sin conexión con la pantalla";

    // vibración en móviles/tablets compatibles
    if (navigator.vibrate) navigator.vibrate(60);

    setTimeout(() => {
      btn.classList.remove("enviado");
      estado.textContent = "Toca para llamar al próximo cliente";
      bloqueado = false;
    }, 1500);
  });
})();
</script>
</body>
</html>
