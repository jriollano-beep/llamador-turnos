<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turnos — Pantalla</title>
<style>
  :root { --bg:#0b1220; --fg:#f8fafc; --accent:#22c55e; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    background: radial-gradient(1200px 800px at 50% 30%, #16233f 0%, var(--bg) 70%);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; overflow:hidden; text-align:center; user-select:none;
  }
  #start {
    position:fixed; inset:0; background:var(--bg); z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
  }
  #start h1 { font-size:2.2rem; font-weight:700; }
  #start p { opacity:.7; font-size:1.1rem; max-width:520px; line-height:1.5; }
  #start button {
    font-size:1.6rem; padding:22px 54px; border:none; border-radius:16px;
    background:var(--accent); color:#052e16; font-weight:800; cursor:pointer;
  }
  .stack { display:flex; flex-direction:column; align-items:center; justify-content:center;
           gap: clamp(8px, 2.5vh, 40px); width:100%; height:100%; padding:4vh 2vw; }
  .label { font-size: clamp(1.2rem, 3.2vw, 2.4rem); letter-spacing:.3em; text-transform:uppercase; opacity:.55; flex:0 0 auto; }
  .caja {
    font-weight:900; line-height:1; margin:0; flex:0 1 auto;
    font-size: min(30vw, 42vh); max-width:96vw;
    text-shadow: 0 0 60px rgba(34,197,94,.45);
    transition: transform .15s ease; white-space:nowrap;
  }
  .caja .n { color: var(--accent); }
  .sub { font-size: clamp(1.3rem, 4vw, 3rem); font-weight:600; opacity:.9; flex:0 0 auto; }
  .flash { animation: pulse 1.1s ease-out; transform-origin:center; }
  @keyframes pulse {
    0% { transform: scale(1.08); } 55% { transform: scale(.99);} 100% { transform: scale(1); }
  }
  .idle { opacity:.35; }
  #dot { position:fixed; top:16px; right:18px; width:12px; height:12px; border-radius:50%;
         background:#f59e0b; box-shadow:0 0 12px #f59e0b; }
  #dot.on { background:var(--accent); box-shadow:0 0 12px var(--accent); }
  #hist { position:fixed; bottom:16px; left:0; right:0; font-size:1rem; opacity:.4; letter-spacing:.1em; }
</style>
</head>
<body>
  <div id="start">
    <h1>Pantalla de Turnos</h1>
    <p>Presiona el botón para activar el sonido y la voz. Deja esta pantalla abierta en el monitor de la fila.</p>
    <button id="startBtn">▶  Activar pantalla</button>
  </div>

  <span id="dot" title="Conexión"></span>
  <div class="stack">
    <div class="label">Próximo cliente</div>
    <div class="caja idle" id="caja"><span>—</span></div>
    <div class="sub idle" id="sub">Esperando…</div>
  </div>
  <div id="hist"></div>

<script>
(function () {
  const cajaEl = document.getElementById("caja");
  const subEl  = document.getElementById("sub");
  const dot    = document.getElementById("dot");
  const histEl = document.getElementById("hist");
  const startScreen = document.getElementById("start");
  const historial = [];

  // Mensaje que dice la voz y que se muestra. Cambia el texto si quieres.
  function frase(caja) { return "Próximo cliente, pase a la caja " + caja; }

  // --- Voz en español ---
  let voz = null;
  function elegirVoz() {
    const voces = speechSynthesis.getVoices();
    voz = voces.find(v => /es(-|_)?(419|MX|US|ES)/i.test(v.lang) && /female|mujer|Paulina|Mónica|Sabina|Google/i.test(v.name))
       || voces.find(v => /^es/i.test(v.lang))
       || voces[0] || null;
  }
  if ("speechSynthesis" in window) {
    elegirVoz();
    speechSynthesis.onvoiceschanged = elegirVoz;
  }

  function chime() {
    try {
      const ac = window._ac || (window._ac = new (window.AudioContext||window.webkitAudioContext)());
      const notas = [880, 1175];
      notas.forEach((f, i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.frequency.value = f; o.type = "sine";
        o.connect(g); g.connect(ac.destination);
        const t = ac.currentTime + i*0.18;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.5, t+0.03);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.4);
        o.start(t); o.stop(t+0.42);
      });
    } catch(e){}
  }

  function hablar(caja) {
    if (!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(frase(caja));
    if (voz) u.voice = voz;
    u.lang = (voz && voz.lang) || "es-ES";
    u.rate = 0.95; u.pitch = 1;
    // repetir una vez para que se escuche claro
    speechSynthesis.speak(u);
    const u2 = new SpeechSynthesisUtterance("Caja " + caja);
    if (voz) u2.voice = voz; u2.lang = u.lang; u2.rate = 0.95;
    speechSynthesis.speak(u2);
  }

  function anunciar(caja) {
    cajaEl.classList.remove("idle","flash");
    subEl.classList.remove("idle");
    void cajaEl.offsetWidth;                 // reinicia animación
    cajaEl.innerHTML = 'Caja <span class="n">' + caja + '</span>';
    cajaEl.classList.add("flash");
    subEl.textContent = "pase por favor";
    chime();
    setTimeout(() => hablar(caja), 350);

    historial.unshift(caja);
    if (historial.length > 6) historial.pop();
    histEl.textContent = "Anteriores:  " + historial.slice(1).map(c => "Caja "+c).join("   ·   ");
  }

  // --- Conexión en tiempo real por SSE (Server-Sent Events) ---
  function conectarSSE() {
    let es;
    try { es = new EventSource("/events"); }
    catch (e) { setTimeout(conectarSSE, 2000); return; }
    es.onopen = () => dot.classList.add("on");
    es.onerror = () => { dot.classList.remove("on"); /* EventSource reintenta solo */ };
    es.onmessage = (ev) => {
      try {
        const m = JSON.parse(ev.data);
        if (m.tipo === "llamar") anunciar(m.caja);
      } catch (e) {}
    };
  }
  conectarSSE();

  // Mantiene despierto el servidor (útil en planes gratuitos que "duermen")
  setInterval(() => { fetch("/health").catch(() => {}); }, 240000);

  // --- Respaldo local: si abres display y caja en el MISMO navegador para probar ---
  try {
    const bc = new BroadcastChannel("turnos");
    bc.onmessage = (e) => { if (e.data && e.data.caja) anunciar(e.data.caja); };
  } catch(e){}

  // --- Desbloquear audio con un clic (requisito de los navegadores) ---
  document.getElementById("startBtn").addEventListener("click", () => {
    try { new (window.AudioContext||window.webkitAudioContext)().resume(); } catch(e){}
    if ("speechSynthesis" in window) { const w = new SpeechSynthesisUtterance(" "); speechSynthesis.speak(w); }
    startScreen.style.display = "none";
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  });
})();
</script>
</body>
</html>
