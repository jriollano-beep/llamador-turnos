<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turnos — JA Riollano · v17</title>
<style>
  :root{
    --green:#1FA24E; --green-d:#15803D; --green-l:#EAF5EE;
    --ink:#243b2b; --muted:#6b7f72; --card:#ffffff;
    --bg:#eef4ef; --line:#e4ece6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Segoe UI",-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink); overflow:hidden; user-select:none;
  }
  .screen{height:100vh; display:flex; flex-direction:column;}
  .main{flex:1; min-height:0; display:grid; grid-template-columns:1.35fr 1fr; grid-template-rows:1fr; gap:22px; padding:26px 30px 14px;}
  .card{background:var(--card); border-radius:22px; box-shadow:0 8px 26px rgba(20,90,50,.06);}

  /* ---------- IZQUIERDA ---------- */
  .left{display:flex; flex-direction:column; gap:14px; min-height:0; overflow:hidden; contain:layout paint;}
  .logo-img{width:min(100%,560px); height:auto; display:block;}
  .logo-wrap{display:flex; flex-direction:column; align-items:center; gap:10px; padding-top:0;}
  .logo{display:flex; align-items:center; gap:12px;}
  .logo .ja{background:var(--green); color:#fff; font-weight:900; font-size:34px; padding:6px 12px; border-radius:8px; letter-spacing:-1px; line-height:1;}
  .logo .name{font-weight:900; font-size:48px; color:var(--green); letter-spacing:1px; position:relative;}
  .logo .name .pencil{position:absolute; right:-6px; top:-14px; font-size:22px; transform:rotate(35deg);}
  .logo .tm{font-size:13px; vertical-align:super; color:var(--green);}
  .tagline{font-weight:800; letter-spacing:6px; font-size:22px; color:var(--ink); opacity:.8;}

  .turno-box{flex:1 1 auto; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:6px; width:100%; text-align:center; overflow:hidden;}
  .section-title{display:flex; align-items:center; gap:18px; color:var(--ink); font-weight:800; letter-spacing:4px; font-size:30px; text-transform:uppercase;}
  .section-title::before,.section-title::after{content:""; height:4px; width:66px; background:var(--green); border-radius:3px;}
  .turno-num{font-weight:900; color:var(--green); line-height:.78; font-size:min(34vw,360px); text-align:center; text-shadow:0 0 22px rgba(31,162,78,.35), 0 8px 40px rgba(31,162,78,.25); white-space:nowrap; transform:translateZ(0); will-change:transform;}
  .turno-num small{font-size:.26em; color:var(--ink); font-weight:800; letter-spacing:5px; display:block; opacity:.72; line-height:1; margin-bottom:.06em;}
  /* El número aparece fijo (sin zoom); solo la flecha se anima */
  .turno-fila{position:relative; display:flex; align-items:center; justify-content:center; width:100%;}
  .flecha{position:absolute; top:0; bottom:0; display:none; align-items:center; color:var(--green);}
  .flecha.izq{left:11%;}
  .flecha.der{right:11%;}
  .flecha.show{display:flex;}
  .flecha svg{width:min(15vw,160px); height:min(15vw,160px); display:block; will-change:transform;}
  .flecha.izq.show svg{animation:pulseIzq 1.1s ease-in-out infinite;}
  .flecha.der.show svg{animation:pulseDer 1.1s ease-in-out infinite;}
  @keyframes pulseIzq{0%,100%{transform:translateX(9px); opacity:.5;} 50%{transform:translateX(-9px); opacity:1;}}
  @keyframes pulseDer{0%,100%{transform:translateX(-9px); opacity:.5;} 50%{transform:translateX(9px); opacity:1;}}
  .turno-idle{color:var(--muted); opacity:.5;}
  .turno-msg{font-weight:900; color:#37474f; font-size:clamp(2.9rem,7.6vw,6rem); text-align:center; line-height:1.15; padding:0 10px; width:100%;}
  .espere-img{max-width:100%; max-height:100%; min-height:0; object-fit:contain; display:block;}

  .banner{display:flex; align-items:center; justify-content:center; gap:16px; background:var(--green); color:#fff; font-weight:800; font-size:30px; padding:20px 26px; border-radius:18px; width:100%; margin-top:4px;}
  .banner svg{width:42px; height:42px; fill:#fff; flex:0 0 auto;}

  .areas{display:flex; justify-content:space-around; gap:8px; padding:6px 4px 2px;}
  .area{display:flex; flex-direction:column; align-items:center; gap:8px; width:20%;}
  .area .ic{width:56px; height:56px; border:2px solid var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .area .ic svg{width:28px; height:28px; stroke:var(--green); fill:none; stroke-width:2;}
  .area .lbl{font-size:12px; font-weight:700; color:var(--ink); text-align:center; letter-spacing:.5px; line-height:1.2;}

  /* ---------- DERECHA ---------- */
  .right{display:flex; flex-direction:column; gap:20px; min-height:0; min-width:0; overflow:hidden;}
  .video-wrap{flex:1; display:flex; align-items:center; justify-content:center; min-height:0; overflow:hidden;}
  .video-card{position:relative; height:100%; max-height:100%; aspect-ratio:9/16; max-width:100%; overflow:hidden; background:#0b1220; padding:0; contain:layout paint; transform:translateZ(0);}
  .video-card video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transform:translateZ(0); backface-visibility:hidden; will-change:transform;}
  .video-ph{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#9fb3c8; font-size:22px; font-weight:700; letter-spacing:1px; text-align:center; line-height:1.4;}
  .recientes{flex:1; padding:18px 22px; display:flex; flex-direction:column; min-height:0;}
  .rec-title{color:var(--green); text-align:right; letter-spacing:3px;}
  .rec-title{display:flex; align-items:center; justify-content:flex-end; gap:14px; font-weight:800; font-size:20px; text-transform:uppercase; margin-bottom:6px;}
  .rec-title::before{content:""; height:3px; width:40px; background:var(--green); border-radius:3px;}
  .rec-list{flex:1; display:flex; flex-direction:column;}
  .rec-row{flex:1; display:flex; align-items:center; gap:20px; border-bottom:1px solid var(--line); padding:4px 6px;}
  .rec-row:last-child{border-bottom:none;}
  .rec-code{font-weight:900; font-size:34px; color:var(--green); min-width:150px;}
  .rec-area{font-size:18px; font-weight:600; color:var(--muted); letter-spacing:.5px;}
  .rec-empty{flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); opacity:.5; font-size:18px;}

  .pagos{padding:20px 22px; flex:0 0 auto;}
  .pagos-title{display:flex; align-items:center; justify-content:center; gap:14px; color:var(--green); font-weight:800; font-size:24px; text-transform:uppercase; letter-spacing:2px; margin-bottom:16px;}
  .pagos-title::before,.pagos-title::after{content:""; height:3px; width:34px; background:var(--green); border-radius:3px;}
  .pagos-row{display:flex; flex-wrap:wrap; justify-content:center; gap:12px;}
  .pago-logo{width:132px; height:84px; background:#fff; border:1px solid var(--line); border-radius:14px; display:flex; align-items:center; justify-content:center; padding:5px; overflow:hidden; box-shadow:0 2px 8px rgba(20,90,50,.05);}
  .pago-logo img{width:100%; height:100%; object-fit:contain; display:block;}
  .horario{padding:20px 22px; background:var(--green-l); border-radius:22px;}
  .horario h3{display:flex; align-items:center; gap:10px; color:var(--green-d); letter-spacing:2px; font-size:17px; text-transform:uppercase; margin-bottom:12px;}
  .horario h3 svg{width:22px; height:22px; stroke:var(--green-d); fill:none; stroke-width:2;}
  .horario .item{margin-bottom:10px;}
  .horario .k{font-weight:800; color:var(--ink); font-size:16px;}
  .horario .v{color:var(--muted); font-size:15px;}
  .horario hr{border:none; border-top:1px solid #d3e6da; margin:10px 0;}

  /* ---------- FOOTER (métodos de pago) ---------- */
  .footer{background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; padding:14px 55px;}
  .pagos-strip{display:flex; flex-wrap:nowrap; justify-content:space-between; align-items:center; gap:10px; width:100%;}
  .pagos-strip .pago-logo{width:118px; height:72px;}

  /* ---------- Tarjeta de info (gracias / hora / web) ---------- */
  .info{padding:16px 22px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; text-align:center; flex:0 0 auto;}
  .info-gracias{font-weight:800; font-size:48px; color:var(--green-d); line-height:1.05;}
  .info-clock{display:flex; align-items:center; gap:12px; color:var(--ink); font-size:22px;}
  .info-clock svg{width:38px; height:38px; stroke:var(--green); fill:none; stroke-width:2; flex:0 0 auto;}
  .info-clock .sep{color:var(--muted); margin:0 4px;}
  .info-clock #fTime{font-weight:700; color:var(--muted); font-size:21px;}
  .info-clock #fDate{font-weight:800; color:var(--ink); font-size:25px;}
  .info-web{font-weight:800; font-size:24px; color:var(--green);}

  /* Overlay activar */
  #start{position:fixed; inset:0; background:var(--bg); z-index:60; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;}
  #start h1{font-size:2rem; color:var(--green-d);}
  #start p{color:var(--muted); max-width:520px; text-align:center; line-height:1.5;}
  #start button{font-size:1.5rem; padding:20px 50px; border:none; border-radius:16px; background:var(--green); color:#fff; font-weight:800; cursor:pointer;}
  #dot{position:fixed; top:12px; right:14px; width:11px; height:11px; border-radius:50%; background:#f59e0b; box-shadow:0 0 10px #f59e0b; z-index:5;}
  #dot.on{background:var(--green); box-shadow:0 0 10px var(--green);}
</style>
</head>
<body>
  <div id="start">
    <h1>Pantalla de Turnos — JA Riollano</h1>
    <p>Presiona el botón para activar el sonido y la voz. Deja esta pantalla abierta en el monitor de la fila.</p>
    <button id="startBtn">▶ Activar pantalla</button>
  </div>

  <span id="dot"></span>

  <div class="screen">
    <div class="main">
      <!-- IZQUIERDA -->
      <div class="left card" style="padding:22px 26px;">
        <div class="logo-wrap">
          <img class="logo-img" alt="JA Riollano — Más de lo que imaginas" src="/logo.png" />
        </div>

        <div class="turno-box">
          <div class="section-title" id="turnoLabel" style="display:none">Turno actual</div>
          <div class="turno-fila" id="turnoFila" style="display:none">
            <span class="flecha izq" id="flechaIzq"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M28 10 L14 24 L28 38"/><path d="M40 10 L26 24 L40 38"/></svg></span>
            <div class="turno-num" id="turno"><small>CAJA</small>—</div>
            <span class="flecha der" id="flechaDer"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10 L34 24 L20 38"/><path d="M8 10 L22 24 L8 38"/></svg></span>
          </div>
          <img class="espere-img" id="turnoMsg" src="/espere.png" alt="Espere a ser llamado" />
        </div>

        <div class="banner" id="banner" style="visibility:hidden">
          <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 4V6L7 10H3zm12.5 2a3.5 3.5 0 00-2-3.15v6.3a3.5 3.5 0 002-3.15z"/></svg>
          <span id="bannerTxt">Por favor, pase a la caja indicada.</span>
        </div>
      </div>

      <!-- DERECHA -->
      <div class="right">
        <div class="video-wrap">
          <div class="video-card card">
            <video id="promo" muted playsinline></video>
            <div class="video-ph" id="videoPh">▶ Video<br>promocional</div>
          </div>
        </div>

        <div class="info card">
          <div class="info-gracias">¡Gracias por su visita!</div>
          <div class="info-clock">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span id="fTime">—</span><span class="sep">·</span><span id="fDate">—</span>
          </div>
          <div class="info-web">jariollano.com</div>
        </div>
      </div>
    </div>

    <!-- FOOTER: métodos de pago -->
    <div class="footer">
      <div class="pagos-strip">
        <div class="pago-logo"><img src="/pagos/money.svg" alt="Efectivo" /></div>
        <div class="pago-logo"><img src="/pagos/athmovil.png" alt="ATH Móvil" /></div>
        <div class="pago-logo"><img src="/pagos/apple-pay.svg" alt="Apple Pay" /></div>
        <div class="pago-logo"><img src="/pagos/google-pay.svg" alt="Google Pay" /></div>
        <div class="pago-logo"><img src="/pagos/visa.svg" alt="Visa" /></div>
        <div class="pago-logo"><img src="/pagos/mastercard.svg" alt="Mastercard" /></div>
        <div class="pago-logo"><img src="/pagos/amex.svg" alt="American Express" /></div>
        <div class="pago-logo"><img src="/pagos/discover.svg" alt="Discover" /></div>
        <div class="pago-logo"><img src="/pagos/giftcard.jpg" alt="Gift Card" /></div>
        <div class="pago-logo"><img src="/pagos/mcs.png" alt="MCS Classicare" /></div>
        <div class="pago-logo"><img src="/pagos/tarjeta-unica.png" alt="Tarjeta Única" /></div>
      </div>
    </div>
  </div>

<script>
(function(){
  const turnoEl=document.getElementById("turno");
  const turnoFila=document.getElementById("turnoFila");
  const flechaIzq=document.getElementById("flechaIzq");
  const flechaDer=document.getElementById("flechaDer");
  const turnoLabel=document.getElementById("turnoLabel");
  const turnoMsg=document.getElementById("turnoMsg");
  const banner=document.getElementById("banner");
  const CAJAS_IZQUIERDA = ["1","2"];   // estas cajas muestran flecha a la izquierda
  const dot=document.getElementById("dot");
  const fDate=document.getElementById("fDate");
  const fTime=document.getElementById("fTime");
  const promo=document.getElementById("promo");
  let seq=0;
  let ultCaja=null, ultT=0;   // para ignorar llamados duplicados (evita audio repetido)

  // Estado en espera: muestra "Espere a ser llamado", oculta el número
  function idle(){
    turnoMsg.style.display="";
    turnoFila.style.display="none";
    flechaIzq.classList.remove("show");
    flechaDer.classList.remove("show");
    turnoLabel.style.display="none";
    banner.style.display=""; banner.style.visibility="hidden";  // reserva el espacio, invisible
  }
  idle();

  // Pausa el video durante el anuncio (para no perder audio del video) y lo reanuda al terminar.
  let unduckTimer=null;
  function duck(){ try{ promo.pause(); }catch(e){} }
  function unduck(){ try{ promo.volume=1; const p=promo.play(); if(p&&p.catch)p.catch(()=>{}); }catch(e){} }

  function frase(caja){ return "Próximo cliente, pase a la caja " + caja; }

  // ---- Reloj / fecha (zona America/La_Paz) ----
  function tick(){
    try{
      const now=new Date();
      fDate.textContent=new Intl.DateTimeFormat("es-BO",{timeZone:"America/La_Paz",day:"numeric",month:"long",year:"numeric"}).format(now);
      let h=Number(new Intl.DateTimeFormat("en-US",{timeZone:"America/La_Paz",hour:"numeric",hour12:false}).format(now));
      const m=new Intl.DateTimeFormat("en-US",{timeZone:"America/La_Paz",minute:"2-digit"}).format(now).padStart(2,"0");
      const ap=h<12?"a.m.":"p.m."; let hh=h%12; if(hh===0) hh=12;
      fTime.textContent=hh+":"+m+" "+ap;
    }catch(e){}
  }
  tick(); setInterval(tick,1000);

  // ---- Voz ----
  let voz=null;
  function elegirVoz(){ const v=speechSynthesis.getVoices(); voz=v.find(x=>/^es/i.test(x.lang))||v[0]||null; }
  if("speechSynthesis" in window){ elegirVoz(); speechSynthesis.onvoiceschanged=elegirVoz; }
  function chime(){
    try{const ac=window._ac||(window._ac=new (window.AudioContext||window.webkitAudioContext)());
      [880,1175].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.type="sine";o.connect(g);g.connect(ac.destination);const t=ac.currentTime+i*.18;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.start(t);o.stop(t+.42);});
    }catch(e){}
  }
  // Muestra el número, la flecha y el banner de una caja
  function mostrar(caja){
    turnoMsg.style.display="none";
    turnoLabel.style.display="";
    turnoFila.style.display="flex";
    turnoEl.innerHTML='<small>CAJA</small>'+caja;  // aparece fijo, sin animación
    // Flecha: cajas 1 y 2 hacia la izquierda, las demás hacia la derecha
    const izq = CAJAS_IZQUIERDA.indexOf(String(caja)) !== -1;
    flechaIzq.classList.toggle("show", izq);
    flechaDer.classList.toggle("show", !izq);
    banner.style.display=""; banner.style.visibility="visible";
  }

  // Dice el mensaje de la caja; llama onDone al terminar (o por seguridad a los 9s)
  function hablar(caja, onDone){
    let listo=false, seg=null;
    function fin(){ if(listo) return; listo=true; if(seg) clearTimeout(seg); onDone(); }
    if(!("speechSynthesis" in window)){ seg=setTimeout(fin, 2500); return; }
    const u=new SpeechSynthesisUtterance(frase(caja) + ".");  // número una sola vez
    if(voz)u.voice=voz; u.lang=(voz&&voz.lang)||"es-ES"; u.rate=.95;
    u.onend=fin; u.onerror=fin;
    speechSynthesis.cancel();
    setTimeout(()=>{ try{ speechSynthesis.speak(u); }catch(e){ fin(); } }, 80);  // respiro tras cancel()
    seg=setTimeout(fin, 9000);  // seguridad si la voz no termina
  }

  // ---- Cola de llamados: no se interrumpen, esperan su turno ----
  let cola=[], ocupado=false, cajaActual=null;
  function procesar(){
    if(ocupado) return;
    if(cola.length===0){ cajaActual=null; idle(); unduck(); return; }  // no hay más: vuelve a espera y reanuda el video
    ocupado=true;
    const caja=cola.shift();
    cajaActual=caja;
    mostrar(caja);
    duck();                                  // pausa el video mientras dura la fila de anuncios
    chime();
    setTimeout(()=>hablar(caja, ()=>{
      ocupado=false; cajaActual=null;
      setTimeout(procesar, 900);             // pausita entre un llamado y el siguiente
    }), 350);
  }

  // Entrada desde el SSE: encola el llamado.
  // No agrega una caja que YA está en la fila o que está sonando en ese momento.
  function anunciar(caja){
    const c=String(caja);
    if(cola.indexOf(c)!==-1 || c===cajaActual) return;   // ya está en fila o sonando -> ignora
    cola.push(c);
    procesar();
  }

  // ---- Videos: promocionales (/videos) intercalados con estáticos (/videos/entre) ----
  // Promos sueltos en /videos.  Estáticos con música en /videos/entre.
  // Si /videos/entre está vacía -> solo rotan los promos (como antes).
  // Si hay uno o más -> se intercalan: promo, estático, promo, estático...
  (function(){
    const ph=document.getElementById("videoPh");
    let promos=[], entre=[], pi=-1, ei=-1, tocaEntre=false;
    async function traer(url){ try{ const r=await fetch(url,{cache:"no-store"}); const l=await r.json(); return Array.isArray(l)?l:[]; }catch(e){ return []; } }
    async function cargar(){ promos=await traer("/videos.json"); entre=await traer("/videos-entre.json"); }
    function siguiente(){
      const hayP=promos.length>0, hayE=entre.length>0;
      if(!hayP && !hayE){ ph.style.display=""; promo.removeAttribute("src"); return; }
      ph.style.display="none";
      let src;
      if(tocaEntre && hayE){                 // toca un estático de entre medio
        ei=(ei+1)%entre.length; src=entre[ei]; tocaEntre=false;
      } else if(hayP){                        // toca un promo (y luego un estático si hay)
        pi=(pi+1)%promos.length; src=promos[pi]; tocaEntre=hayE;
      } else {                                // solo hay estáticos
        ei=(ei+1)%entre.length; src=entre[ei];
      }
      promo.src=src;
      promo.play().catch(()=>{});
    }
    promo.addEventListener("ended", async ()=>{ await cargar(); siguiente(); });
    promo.addEventListener("error", ()=>{ setTimeout(siguiente,900); });
    (async()=>{ await cargar(); siguiente(); })();
    // Si no hay video sonando (p.ej. acabas de subir el primero), reintenta solo
    setInterval(async ()=>{ if(!promo.currentSrc){ await cargar(); siguiente(); } }, 30000);
  })();

  // ---- SSE ----
  function conectar(){ let es; try{es=new EventSource("/events");}catch(e){setTimeout(conectar,2000);return;}
    es.onopen=()=>dot.classList.add("on");
    es.onerror=()=>dot.classList.remove("on");
    es.onmessage=(ev)=>{ try{const m=JSON.parse(ev.data); if(m.tipo==="llamar") anunciar(m.caja);}catch(e){} };
  }
  conectar();
  setInterval(()=>{ fetch("/health").catch(()=>{}); },240000);

  // Amplifica el audio del video para igualarlo con la voz del anuncio
  const GANANCIA_VIDEO = 1.9;
  function amplificarVideo(){
    try{
      const ac = window._ac || (window._ac = new (window.AudioContext||window.webkitAudioContext)());
      if(!promo._gainSet){
        const src = ac.createMediaElementSource(promo);
        const g = ac.createGain();
        g.gain.value = GANANCIA_VIDEO;
        src.connect(g); g.connect(ac.destination);
        promo._gainSet = true;
      }
    }catch(e){}
  }

  document.getElementById("startBtn").addEventListener("click",()=>{
    try{ const ac=window._ac||(window._ac=new (window.AudioContext||window.webkitAudioContext)()); ac.resume(); }catch(e){}
    if("speechSynthesis" in window){const w=new SpeechSynthesisUtterance(" ");speechSynthesis.speak(w);}
    try{ promo.muted=false; promo.volume=1; amplificarVideo(); promo.play(); }catch(e){}   // activa y sube el audio del video
    document.getElementById("start").style.display="none";
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  });
})();
</script>
</body>
</html>
